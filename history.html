<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>StockPro - Lịch sử</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
  </head>

  <body>
    <nav class="navbar navbar-expand-lg app-navbar">
      <div class="container">
        <a class="navbar-brand" href="index.html">StockPro</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Mở menu">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div id="mainNav" class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Tồn kho</a></li>
            <li class="nav-item"><a class="nav-link active" href="history.html">Lịch sử</a></li>
            <li class="nav-item"><a class="nav-link" href="pages/admin/dashboard.html">Admin</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
          <p class="text-muted mb-1">Public</p>
          <h1 class="page-title h3 mb-0">Lịch sử nhập / xuất kho</h1>
        </div>
        <a href="index.html" class="btn btn-outline-primary btn-sm">Quay lại tồn kho</a>
      </div>

      <div class="loading-box alert alert-info">Đang tải dữ liệu...</div>

      <section class="card">
        <div class="card-header bg-white fw-semibold">Toàn bộ giao dịch</div>

        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>Thời gian</th>
                <th>Hàng hóa</th>
                <th>Loại</th>
                <th>Số lượng</th>
                <th>Ghi chú</th>
              </tr>
            </thead>
            <tbody id="historyTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <div id="toastBox" class="toast-container position-fixed top-0 end-0 p-3"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/history.js"></script>
