<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Stock Pro{% endblock %}</title>
    <meta name="description" content="{% block description %}Stock Pro - nền tảng quản lý kho hàng và bán sản phẩm trực tuyến.{% endblock %}">
    <link rel="preconnect" href="https://images.unsplash.com">
    <link rel="preconnect" href="https://images.pexels.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}?v=20260622">
    {% block extra_css %}{% endblock %}
</head>
<body {% block body_attrs %}{% endblock %}>
    {% block body %}{% endblock %}
    <script src="{{ url_for('static', path='js/script.js') }}?v=20260622"></script>
    <script src="{{ url_for('static', path='js/auth.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
