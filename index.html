<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>StockPro - Public</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="assets/css/style.css">
  </head>

  <body>
    <nav class="navbar navbar-expand-lg app-navbar">
      <div class="container">
        <a class="navbar-brand" href="index.html">StockPro</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div id="mainNav" class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link active" href="index.html">Tồn kho</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="history.html">Lịch sử</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="pages/admin/dashboard.html">Admin</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
          <p class="text-muted mb-1">Public</p>
          <h1 class="page-title h3 mb-0">Bảng tồn kho công khai</h1>
        </div>
        <span class="badge text-bg-light border">MockAPI.io</span>
      </div>

      <section class="row g-3 mb-4">
        <div class="col-md-4">
          <div class="card stat-card">
            <div class="card-body">
              <div class="text-muted">Tổng mặt hàng</div>
              <div id="totalProducts" class="h3">0</div>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card stat-card">
            <div class="card-body">
              <div class="text-muted">Hàng tồn thấp</div>
              <div id="lowStockCount" class="h3 text-warning">0</div>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card stat-card">
            <div class="card-body">
              <div class="text-muted">Giá trị tồn kho</div>
              <div id="inventoryValue" class="h3">0 đ</div>
            </div>
          </div>
        </div>
      </section>

      <section class="card mb-4">
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-8">
              <input
                id="searchInput"
                class="form-control"
                placeholder="Tìm theo mã hàng hoặc tên hàng..."
              >
            </div>

            <div class="col-md-4">
              <select id="filterCategory" class="form-select">
                <option value="">Tất cả nhóm hàng</option>
              </select>
            </div>
          </div>
        </div>
      </section>

      <div class="loading-box alert alert-info">Đang tải dữ liệu...</div>

      <section class="card">
        <div class="card-header bg-white fw-semibold">Danh sách hàng hóa</div>

        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead class="table-light">
              <tr>
                <th>Ảnh</th>
                <th>Mã / Tên</th>
                <th>Nhóm</th>
                <th>Tồn kho</th>
                <th>Giá</th>
                <th>Mô tả</th>
              </tr>
            </thead>
            <tbody id="productTableBody"></tbody>
          </table>
        </div>
      </section>

      <section class="mt-4">
        <button id="historyToggle" class="btn btn-outline-primary">
          Xem nhanh lịch sử nhập/xuất
        </button>

        <div id="historyBox" class="card mt-3" style="display: none;">
          <div class="card-header bg-white fw-semibold">50 giao dịch mới nhất</div>

          <div class="table-responsive">
            <table class="table mb-0">
              <thead class="table-light">
                <tr>
                  <th>Thời gian</th>
                  <th>Hàng hóa</th>
                  <th>Loại</th>
                  <th>SL</th>
                  <th>Ghi chú</th>
                </tr>
              </thead>
              <tbody id="transactionTableBody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <div id="toastBox" class="toast-container position-fixed top-0 end-0 p-3"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/public.js"></script>
  </body>
</html>
